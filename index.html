<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Hub</title>
</head>
<body>
  <h1>Welcome to Video Hub</h1>
  <div id="videos"></div>

  <script>
    fetch('/.netlify/functions/content')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('videos');
        if (!data.videos || data.videos.length === 0) {
          container.innerHTML = "<p>No video uploaded yet</p>";
          return;
        }
        data.videos.forEach(video => {
          const div = document.createElement('div');
          div.innerHTML = `
            <h3>${video.title}</h3>
            <video width="300" controls src="${video.url}"></video>
          `;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
